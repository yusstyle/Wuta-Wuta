name: Security Analysis

on:
  push:
    branches: [ main, develop, 'feature/*', 'advanced-ai-settings-menu' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 0 * * 1' # Weekly on Monday

jobs:
  dependency-security:
    name: Dependency Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run npm audit
      run: npm audit --json > npm-audit.json || echo "Audit completed with issues"
      
    - name: Upload npm audit results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: npm-audit-results
        path: npm-audit.json
        
    - name: Run Snyk security scan
      uses: snyk/actions/node@master
      continue-on-error: true
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --severity-threshold=high

  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run SonarCloud scan
      uses: SonarSource/sonarcloud-github-action@master
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        
    - name: Run CodeQL analysis
      uses: github/codeql-action/init@v2
      with:
        languages: javascript
        
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
      
    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v2

  smart-contract-security:
    name: Smart Contract Security
    runs-on: ubuntu-latest
    if: ${{ contains(github.event.head_commit.message, '[contracts]') || contains(github.event.head_commit.message, '[solidity]') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Compile contracts
      run: npx hardhat compile || echo "Hardhat contracts not found, skipping"
      
    - name: Run Slither
      uses: crytic/slither-action@v0.3.0
      id: slither
      continue-on-error: true
      with:
        target: 'contracts/'
        slither-args: '--filter-paths "node_modules/" --exclude naming-convention,external-function --json slither-results.json'
        
    - name: Upload Slither SARIF
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: ${{ steps.slither.outputs.sarif }}
        
    - name: Upload Slither JSON
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: slither-results
        path: slither-results.json

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [dependency-security, code-quality, smart-contract-security]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Generate security report
      run: |
        echo "# Security Analysis Report" > security-report.md
        echo "Generated on: $(date)" >> security-report.md
        echo "" >> security-report.md
        echo "## Summary" >> security-report.md
        echo "- Dependency Security: ${{ needs.dependency-security.result }}" >> security-report.md
        echo "- Code Quality: ${{ needs.code-quality.result }}" >> security-report.md
        echo "- Smart Contract Security: ${{ needs.smart-contract-security.result }}" >> security-report.md
        echo "" >> security-report.md
        echo "## Detailed Results" >> security-report.md
        
        if [ -f "npm-audit-results/npm-audit.json" ]; then
          echo "### NPM Audit Results" >> security-report.md
          echo "\`\`\`json" >> security-report.md
          cat npm-audit-results/npm-audit.json | head -50 >> security-report.md
          echo "\`\`\`" >> security-report.md
        fi
        
        if [ -f "slither-results/slither-results.json" ]; then
          echo "### Slither Analysis" >> security-report.md
          echo "\`\`\`json" >> security-report.md
          cat slither-results/slither-results.json | head -50 >> security-report.md
          echo "\`\`\`" >> security-report.md
        fi
        
    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.md
        
    - name: Comment PR with security report
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('security-report.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
