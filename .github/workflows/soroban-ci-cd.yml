name: 'Soroban CI/CD - Mainnet Fork Gas Prediction'

on:
  push:
    branches: [main]
    paths:
      - 'stellar-contracts/**'
      - '.github/workflows/soroban-ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'stellar-contracts/**'
      - '.github/workflows/soroban-ci-cd.yml'
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SOROBAN_NETWORK: testnet

jobs:
  build-test:
    name: 'Build & Test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust
        uses: swatinem/rust-cache@v2

      - name: Install Soroban CLI
        uses: soroban-org/setup-soroban@v1
        with:
          soroban-version: 'v21.0.0'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stellar-contracts/package-lock.json

      - name: Install dependencies (stellar-contracts)
        run: cd stellar-contracts && npm ci

      - name: 🔨 Build contracts
        run: |
          cd stellar-contracts
          npm run build:wutawuta

      - name: 🔬 Run Rust tests
        run: |
          cd stellar-contracts/contracts
          cargo test --all-features

      - name: 🧹 Static analysis
        run: |
          cd stellar-contracts/contracts
          cargo clippy --all-features -- -D warnings

      - name: 📊 Generate coverage report
        uses: actions-rs/tarpaulin@v0.1
        with:
          args: '--all-features --out Lcov'
          path: 'stellar-contracts/contracts'

      - name: 📈 Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./stellar-contracts/contracts/tarpaulin.lcov

      - name: 📦 Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: soroban-wasm
          path: stellar-contracts/contracts/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  mainnet-fork-test:
    name: 'Mainnet Fork - Gas Prediction & Failure Detection'
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust & Soroban
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install Soroban CLI
        uses: soroban-org/setup-soroban@v1
        with:
          soroban-version: 'v21.0.0'

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: soroban-wasm

      - name: 🖥️ Start local Soroban RPC (Mainnet fork mode)
        run: |
          # Start Soroban RPC with mainnet fork (historical ledger restore)
          soroban rpc serve \
            --address 127.0.0.1:8000 \
            --network mainnet \
            --ledger mainnet-latest \
            --admin-port 8080 \
            --log-level info &
          RPC_PID=$!
          sleep 10
          # Health check
          curl -f http://127.0.0.1:8000/health || (kill $RPC_PID && exit 1)
          echo \"LOCAL_RPC_PID=$RPC_PID\" >> $GITHUB_ENV

      - name: 🔗 Install Node & deps
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        env:
          SOROBAN_RPC_URL: http://127.0.0.1:8000
        run: |
          cd stellar-contracts && npm ci

      - name: 🧪 Run mainnet fork tests + gas analysis
        env:
          SOROBAN_RPC_URL: http://127.0.0.1:8000
          NETWORK_PASSPHRASE: \"Public Global Stellar Network ; September 2015\"
        run: |
          cd stellar-contracts
          npm run test:mainnet-fork  # Custom script: deploy to local, run txs, measure gas

      - name: 📊 Parse & report gas costs
        if: always()
        run: |
          cd stellar-contracts
          node scripts/gas-report.js
        env:
          GAS_REPORT_PATH: ./gas-report.json

      - name: ❌ Fail on high gas / failures
        if: failure()
        run: |
          echo \"🚨 Mainnet fork tests failed or gas exceeded thresholds!\"
          echo \"Check gas-report.json artifact for details.\"
          exit 1

      - name: 📋 Upload gas report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-prediction-report
          path: |
            stellar-contracts/gas-report.json
            stellar-contracts/gas-report.html

  deploy-testnet:
    name: 'Deploy to Testnet'
    runs-on: ubuntu-latest
    needs: [build-test, mainnet-fork-test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'release'
    environment: testnet
    steps:
      - name: Checkout & Deploy
        env:
          STELLAR_RPC_URL: https://rpc-futurenet.stellar.org
          NETWORK_PASSPHRASE: \"Test SDF Future Network ; October 2022\"
          PRIVATE_KEY: ${{ secrets.STELLAR_DEPLOY_KEY_TESTNET }}
        run: |
          cd stellar-contracts
          npm run deploy:testnet

      - name: 📄 Save deployment info
        run: |
          echo \"Testnet deployment: $(cat stellar-contracts/deployment.json)\" >> $GITHUB_STEP_SUMMARY

  deploy-mainnet:
    name: 'Deploy to Mainnet'
    runs-on: ubuntu-latest
    needs: [build-test, mainnet-fork-test, deploy-testnet]
    if: github.event_name == 'release' && github.event.release.prerelease != 'true'
    environment: mainnet
    steps:
      - name: Checkout & Deploy Mainnet
        env:
          STELLAR_RPC_URL: https://rpc.stellar.org
          NETWORK_PASSPHRASE: \"Public Global Stellar Network ; September 2015\"
          PRIVATE_KEY: ${{ secrets.STELLAR_DEPLOY_KEY_MAINNET }}
        run: |
          cd stellar-contracts
          npm run deploy:mainnet

      - name: 🎉 Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: success
          fields: repo,message,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
