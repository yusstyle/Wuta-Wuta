    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;

        top: -40px;
        left: 6px;
        background: #000;
        color: white;
        padding: 8px;

        border-radius: 4px;
        z-index: 1000;
      }
      .skip-link:focus {
        top: 6px;
      }
